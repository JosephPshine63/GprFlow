services:
  db:
    image: postgres:15
    container_name: gprflow-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-gprflow}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-gprflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./backend/monolith
    container_name: gprflow-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Schema is created via ddl-auto=update (dev profile) since Liquibase
      # isn't wired up yet (see CLAUDE.md). Revisit once migrations exist.
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-gprflow}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-wpembytrwcvnryxksdbqwjebruyGHyudqgwveytrtrCSnwifoesarjbwe}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      MAIL_USERNAME: ${MAIL_USERNAME:-your email}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-your app password}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-your key}
      RAZORPAY_API_KEY: ${RAZORPAY_API_KEY:-your razorpay key}
      RAZORPAY_API_SECRET: ${RAZORPAY_API_SECRET:-your razorpay secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-your secret}
      # Coin domain lives in coin-service now (Fase 4); kept published on
      # 5454 for direct debug access, but Coin/ChatBot calls go through it.
      COIN_SERVICE_URL: http://coin-service:5455
    ports:
      - "5454:5454"

  coin-service:
    build:
      context: ./backend/coin-service
    container_name: gprflow-coin-service
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-gprflow}?currentSchema=coin
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-wpembytrwcvnryxksdbqwjebruyGHyudqgwveytrtrCSnwifoesarjbwe}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-your coin gecko api key}
    # No published port: reachable only via the gateway or the internal
    # Compose network (CoinClient in the monolith calls it by DNS name).

  chatbot-service:
    build:
      context: ./backend/chatbot-service
    container_name: gprflow-chatbot-service
    restart: always
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-your gemini api key}
    # No published port: reachable only via the gateway.

  gateway:
    build:
      context: ./backend/gateway
    container_name: gprflow-gateway
    restart: always
    depends_on:
      - app
      - coin-service
      - chatbot-service
    environment:
      MONOLITH_URL: http://app:5454
      COIN_SERVICE_URL: http://coin-service:5455
      CHATBOT_SERVICE_URL: http://chatbot-service:5456
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: gprflow-frontend
    restart: always
    depends_on:
      - gateway
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
    ports:
      - "5173:80"

volumes:
  postgres-data:
