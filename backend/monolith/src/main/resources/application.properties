spring.application.name=gprflow
spring.banner.location=classpath:templates/banner.txt

server.port=5454

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gprflow}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate

# JWT secret — set JWT_SECRET env var in production
jwt.secret=${JWT_SECRET:wpembytrwcvnryxksdbqwjebruyGHyudqgwveytrtrCSnwifoesarjbwe}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}

# Frontend base URL for payment callbacks
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your email}
spring.mail.password=${MAIL_PASSWORD:your app password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#stripe payment gatway
stripe.api.key=${STRIPE_API_KEY:your key}

#razorpay payment gaytway
razorpay.api.key=${RAZORPAY_API_KEY:your razorpay key}
razorpay.api.secret=${RAZORPAY_API_SECRET:your razorpay secret}

# coin-service base URL (Fase 4 step 4) — Docker Compose DNS default, override for local/non-Docker dev
coin.service.url=${COIN_SERVICE_URL:http://coin-service:5455}

#google oauth2 (optional)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your secret}

