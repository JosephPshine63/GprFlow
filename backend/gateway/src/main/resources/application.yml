server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
              - "http://localhost:5174"
              - "http://localhost:4200"
              - "https://zosh-treading.vercel.app"
            allowedMethods:
              - "*"
            allowedHeaders:
              - "*"
            exposedHeaders:
              - "Authorization"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: coin-service
          uri: ${COIN_SERVICE_URL:http://coin-service:5455}
          predicates:
            - Path=/api/coins/**
        - id: chatbot-service
          uri: ${CHATBOT_SERVICE_URL:http://chatbot-service:5456}
          predicates:
            - Path=/chat/**
        - id: monolith
          uri: ${MONOLITH_URL:http://app:5454}
          predicates:
            - Path=/**
